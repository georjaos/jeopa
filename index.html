<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Jeopardy Board</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url('image.png') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    /* Dark overlay for readability */
    body::before {
  		content: "";
  		position: fixed;
  		top: 0;
  		left: 0;
  		width: 100%;
  		height: 100%;
  		background: rgba(0, 0, 0, 0.55);
  	pointer-events: none;
    }

    .game-container {
  		width: 100%;
  		max-width: 1200px;
  		position: relative;
  		z-index: 1;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 3rem;
      text-shadow: 2px 2px 6px black;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .category {
      background: #0d2c91;
      border: 2px solid #ffffff33;
      min-height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .cell {
      background: #1d4ed8;
      border: 2px solid #ffffff22;
      min-height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 2rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 1px 1px 3px black;
    }

    .cell:hover {
      transform: scale(1.03);
      background: #2563eb;
    }

    .cell.used {
      visibility: hidden;
</html>
